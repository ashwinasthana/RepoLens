<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
<div id="app">

  <!-- Resize handle (left edge) -->
  <div id="resize-handle" title="Drag to resize"></div>

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <i class="ti ti-zoom-code" id="logo-icon"></i>
      <span id="logo">RepoLens</span>
      <span id="repo-name">—</span>
    </div>
    <div id="header-actions">
      <button id="settings-btn" title="Settings">
        <i class="ti ti-settings"></i>
      </button>
      <button id="open-web-btn" title="Open in web app">
        <i class="ti ti-external-link"></i>
      </button>
      <button id="close-btn" title="Close">
        <i class="ti ti-x"></i>
      </button>
    </div>
  </div>

  <!-- Analyze bar -->
  <div id="analyze-bar">
    <button id="analyze-btn">
      <i class="ti ti-telescope"></i> Analyze Repository
    </button>
  </div>

  <!-- Error banner -->
  <div id="error-bar"></div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Body -->
  <div id="body">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p id="loading-text">Scanning repository…</p>
    </div>

    <!-- File tree -->
    <div id="tree-panel">
      <div id="tree-header">
        <i class="ti ti-files"></i> <span id="tree-count">Files</span>
      </div>
      <!-- Search -->
      <div id="tree-search-wrap">
        <i class="ti ti-search" id="tree-search-icon"></i>
        <input type="text" id="tree-search" placeholder="Search files…" />
        <button id="tree-search-clear" style="display:none;">
          <i class="ti ti-x"></i>
        </button>
      </div>
      <div id="tree-scroll">
        <div class="detail-empty">
          <i class="ti ti-folder-open" style="font-size:28px"></i>
          <span>Click Analyze</span>
        </div>
      </div>
    </div>

    <!-- Detail panel -->
    <div id="detail-panel">
      <div class="detail-empty">
        <i class="ti ti-file-search" style="font-size:28px"></i>
        <span>Select a file to explore</span>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <i class="ti ti-point-filled" id="status-dot" style="color:#3fb950;font-size:10px"></i>
    <span id="status-text">No repository loaded</span>
  </div>

  <!-- Chat Widget -->
  <button id="chat-fab" style="display: none;">
    <i class="ti ti-sparkles"></i> Ask AI
  </button>
  <div id="chat-widget" style="display: none;">
    <div id="chat-header">
      <div id="chat-title"><i class="ti ti-sparkles"></i> RepoLens Chat</div>
      <button id="chat-close"><i class="ti ti-x"></i></button>
    </div>
    <div id="chat-messages">
      <div class="chat-msg assistant">
        <div class="chat-avatar"><i class="ti ti-robot"></i></div>
        <div class="chat-text">What would you like to know about this repository?</div>
      </div>
    </div>
    <form id="chat-form">
      <input type="text" id="chat-input" placeholder="Ask a question..." autocomplete="off" />
      <button type="submit" id="chat-send"><i class="ti ti-send"></i></button>
    </form>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay" style="display: none;">
    <div id="settings-modal">
      <div id="settings-header">
        <div id="settings-title"><i class="ti ti-settings"></i> Settings</div>
        <button id="settings-close"><i class="ti ti-x"></i></button>
      </div>
      <div id="settings-body">
        <div class="settings-group">
          <label>Engine Access Token</label>
          <input type="password" id="groq-key-input" placeholder="rep_..." />
          <p class="settings-hint">Required for AI analysis. <a href="https://console.groq.com/keys" target="_blank">Get token</a></p>
        </div>
        <div class="settings-group">
          <label>GitHub Token (Optional)</label>
          <input type="password" id="gh-token-input" placeholder="ghp_..." />
          <p class="settings-hint">Higher rate limits for large repos. <a href="https://github.com/settings/tokens" target="_blank">Get token</a></p>
        </div>
        <button id="save-settings-btn">Save & Reload</button>
      </div>
    </div>
  </div>

</div>
<script src="services.js"></script>
<script src="sidebar.js"></script>
</body>
</html>
